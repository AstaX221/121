name: Build EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # позволяет запускать вручную

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --name galaxy_nick_checker main.py

    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: galaxy-nick-checker-exe
        path: dist/galaxy_nick_checker.exe
